<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Le Moritz · Performance de Produtos</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.14);
    --text-primary: #f0ede8;
    --text-secondary: #888880;
    --text-tertiary: #555550;
    --blue: #4a90d9;
    --green: #3bbf8a;
    --coral: #e06045;
    --purple: #9b8fe8;
    --blue-dim: rgba(74,144,217,0.18);
    --green-dim: rgba(59,191,138,0.18);
    --coral-dim: rgba(224,96,69,0.18);
    --purple-dim: rgba(155,143,232,0.18);
  }

  html { background: var(--bg); }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 48px 24px 80px;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    margin-bottom: 32px;
    animation: fadeUp 0.4s ease both;
  }

  .header-eyebrow {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 6px;
    font-family: 'DM Mono', monospace;
  }

  .header-title {
    font-size: 22px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .header-period {
    font-size: 13px;
    color: var(--text-secondary);
  }

  /* Summary cards */
  .summary {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 36px;
    animation: fadeUp 0.4s 0.05s ease both;
  }

  @media (max-width: 600px) {
    .summary { grid-template-columns: repeat(2, 1fr); }
  }

  .metric {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: border-color 0.2s;
  }

  .metric:hover { border-color: var(--border-hover); }

  .metric-label {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }

  .metric-value {
    font-size: 20px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.2;
  }

  .metric-sub {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 3px;
  }

  /* Section label */
  .section-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    font-family: 'DM Mono', monospace;
    margin-bottom: 12px;
    animation: fadeUp 0.4s 0.1s ease both;
  }

  /* Product cards */
  .products {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .product-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    transition: border-color 0.2s, background 0.2s;
    animation: fadeUp 0.4s ease both;
  }

  .product-card:hover {
    border-color: var(--border-hover);
    background: var(--surface2);
  }

  .product-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 14px;
  }

  .product-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.5;
    flex: 1;
  }

  .product-right { text-align: right; flex-shrink: 0; }

  .product-gmv {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    font-family: 'DM Mono', monospace;
    letter-spacing: -0.01em;
  }

  .product-units {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 2px;
  }

  /* Channels */
  .channels {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  @media (max-width: 500px) {
    .channels { grid-template-columns: repeat(2, 1fr); }
  }

  .channel {
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    padding: 8px 10px;
    border: 0.5px solid var(--border);
  }

  .channel-label {
    font-size: 10px;
    color: var(--text-tertiary);
    margin-bottom: 3px;
    letter-spacing: 0.02em;
  }

  .channel-val {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    font-family: 'DM Mono', monospace;
    margin-bottom: 5px;
  }

  .channel-val.empty {
    color: var(--text-tertiary);
    font-weight: 400;
    font-family: 'DM Sans', sans-serif;
  }

  .bar-track {
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .bar-video { background: var(--blue); }
  .bar-loja  { background: var(--green); }
  .bar-live  { background: var(--coral); }
  .bar-card  { background: var(--purple); }

  /* Legend */
  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    animation: fadeUp 0.4s 0.08s ease both;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-secondary);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-eyebrow">Le Moritz · TikTok Shop</div>
    <div class="header-title">Performance de Produtos</div>
    <div class="header-period">02 mai – 12 mai 2026 · 12 produtos ativos</div>
  </div>

  <div class="summary">
    <div class="metric">
      <div class="metric-label">GMV total</div>
      <div class="metric-value">R$ 20.584</div>
      <div class="metric-sub">período</div>
    </div>
    <div class="metric">
      <div class="metric-label">Unidades vendidas</div>
      <div class="metric-value">160</div>
      <div class="metric-sub">pedidos</div>
    </div>
    <div class="metric">
      <div class="metric-label">Maior canal</div>
      <div class="metric-value">Vídeo</div>
      <div class="metric-sub">~74% do GMV</div>
    </div>
    <div class="metric">
      <div class="metric-label">Top produto</div>
      <div class="metric-value">Sérum Lifting</div>
      <div class="metric-sub">R$ 14.312 · 127 un.</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Vídeo</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Aba Loja</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--coral)"></div>LIVE</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>Cartão de produto</div>
  </div>

  <div class="section-label">Produtos por GMV</div>

  <div class="products" id="products-list"></div>

</div>

<script>
const products = [
  { name: "Sérum Redutor de Linhas Finas — Efeito Lifting Cinderela", gmv: 14312.06, units: 127, video: 13047.43, loja: 1185.04, live: 204.95, card: 843.86 },
  { name: "Kit Pincel Grátis — Blush Stick 2 em 1, Iluminador, FPS, Rímel", gmv: 2630.69, units: 10, video: 1844.36, loja: 751.80, live: 0, card: 786.33 },
  { name: "Kit Completo Pele Madura — Skincare e Maquiagem 12 Itens", gmv: 726.75, units: 1, video: 726.75, loja: 726.75, live: 0, card: 0 },
  { name: "Kit Make Essencial — Blush Terracota, Iluminador Rosê, Pincel 8 em 1", gmv: 703.78, units: 4, video: 0, loja: 191.09, live: 0, card: 506.78 },
  { name: "Máscara de Cílios — Rímel Volume Intenso, Novo Aplicador", gmv: 664.50, units: 8, video: 321.19, loja: 256.99, live: 171.14, card: 82.36 },
  { name: "Kit Lifting e Firmeza para Olhos 3 em 1 — Sérum + Máscara Regenerativa", gmv: 631.66, units: 3, video: 0, loja: 0, live: 0, card: 416.03 },
  { name: "Kit Rotina de Hidratação Facial 4 em 1 — Mousse + Tônico + Sérum + Creme", gmv: 455.77, units: 2, video: 0, loja: 224.47, live: 0, card: 455.77 },
  { name: "Kit Rejuvenescimento — Sérum Lifting, Creme Antirrugas, Rejuvenescedor Noturno", gmv: 297.00, units: 1, video: 0, loja: 0, live: 0, card: 297.00 },
  { name: "Creme Antirrugas Multicamadas — Ácido Hialurônico + Colágeno + Peptídeo Tensor", gmv: 110.87, units: 1, video: 0, loja: 0, live: 0, card: 0 },
  { name: "Blush Bastão Multifuncional 4 em 1 — Terracota, Coral, Rosa Mauve, Marrom", gmv: 87.00, units: 1, video: 0, loja: 0, live: 0, card: 0 },
  { name: "Hidratante Facial FPS 50 em Bastão Stick — Pele 40+", gmv: 82.30, units: 1, video: 0, loja: 0, live: 0, card: 82.30 },
  { name: "Pincel 9 em 1 Multifuncional", gmv: 82.21, units: 1, video: 0, loja: 0, live: 0, card: 82.21 },
];

const fmt = v => v > 0
  ? 'R$\u202F' + v.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 0 })
  : '—';

const pct = (v, total) => total > 0 ? Math.round(v / total * 100) : 0;

const channels = [
  { key: 'video', label: 'Vídeo',    barClass: 'bar-video' },
  { key: 'loja',  label: 'Aba Loja', barClass: 'bar-loja'  },
  { key: 'live',  label: 'LIVE',     barClass: 'bar-live'  },
  { key: 'card',  label: 'Cartão',   barClass: 'bar-card'  },
];

const list = document.getElementById('products-list');

products.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'product-card';
  card.style.animationDelay = `${0.12 + i * 0.04}s`;

  const chHTML = channels.map(ch => {
    const v = p[ch.key];
    const w = pct(v, p.gmv);
    return `
      <div class="channel">
        <div class="channel-label">${ch.label}</div>
        <div class="channel-val${v === 0 ? ' empty' : ''}">${fmt(v)}</div>
        <div class="bar-track">
          <div class="bar-fill ${ch.barClass}" style="width:${w}%"></div>
        </div>
      </div>`;
  }).join('');

  card.innerHTML = `
    <div class="product-header">
      <div class="product-name">${p.name}</div>
      <div class="product-right">
        <div class="product-gmv">${fmt(p.gmv)}</div>
        <div class="product-units">${p.units} un.</div>
      </div>
    </div>
    <div class="channels">${chHTML}</div>`;

  list.appendChild(card);
});
</script>
</body>
</html>
